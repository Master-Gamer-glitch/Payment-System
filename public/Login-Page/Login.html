<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="frontend.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
    
    <header>
        <span id="sadak">SADAK</span><span id="pe">PE</span>
    </header>
    <section id="main-content">
        <main id="main">
            <div id="btns1">
                <button id="login" class="selectedButton">Login</button>
                <button id="register" class="unselectedButton">Register</button>
            </div>
            <section id="inputs">
                <div id="userDetails"><input type="text" placeholder="Enter Email" id="email"></div>
                <div id="userPass"><input type="password" placeholder="Enter Password" id="pass"></div>
            </section>
            <div id="message"></div>
            <div id="btns2">
                <button id="login2">Login</button>
            </div>
            <a id="forgot" href="">Forgot Password ?</a>
        </main>
        
    </section>
    <script src="frontend.js"></script>
</body>
</html>
