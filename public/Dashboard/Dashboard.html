<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/Dashboard/Dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body>
    <header>
        <a class="brandLogo" href="/Dashboard/Dashboard.html">
            <span id="sadak">SADAK</span><span id="pe">PE</span>
        </a>
        <div id="us">
            <a href="">Home &nbsp;</a href="">
            <a href=""> &nbsp;About Us </a href="">
            <a href=""> &nbsp; Contact Us</a href="">
        </div>
        
        <div id="btns">
            <button class="bi bi-person-circle" id="profile"> &nbsp;Profile &nbsp;</button>
            <button class="bi bi-bell-fill" id="notification"></button>
            <div id="profileMenu">
                <button id="profileOption">Profile</button>
                <button id="logoutOption">Logout</button>
            </div>
        </div>
    </header>
    <main>
        <section id="data">
            <div><span id="wlcm">Welcome, </span><span id="username">...</span></div>
            <div><span id="balance">Available Balance: </span><span id="amt">...</span></div>
        </section>
        <div id="content">
            <section id="actions">
                <div>Payments & Transfers</div>
                <div id="actionButtons">
                    <button id="upi" class="selectedButton">Send Money</button>
                    <button id="topup" class="unselectedButton">Top-up</button> <br>

                    <div id="inputs">
                        <input type="text" placeholder="Enter Receiver Email" id="accDetail"> <br id="accDetailBreak">
                        <input type="number" placeholder="Enter amount to send" id="amtInput"> <br>
                    </div>

                    <div id="billsOptions">
                        <button style="border-radius: 30%; padding: 3%; font-size: 60%; margin: 3% 1% 2% 1%">Mobile <br>
                            Recharge</button>
                        <button style="border-radius: 30%; padding: 3%; font-size: 60%; margin: 3% 1% 2% 1%">Wifi <br>
                            Recharge</button>
                        <button style="border-radius: 30%; padding: 3%; font-size: 60%; margin: 3% 1% 2% 1%">Electricity
                            <br> Bill</button>
                        <button style="border-radius: 30%; padding: 3%; font-size: 60%; margin: 3% 0% 2% 1%">Water <br>
                            Bill</button>
                    </div>
                    <div id="message"></div>
                    <button id="send" class="selectedButton">Send</button>
                </div>
            </section>
            <section id="transactions">
                <div id="recent">Recent Transactions</div>
                <div id="rcntBox">
                    <!-- Transactions will be loaded dynamically -->
                </div>
                <button id="veiw">View All</button>
            </section>
            <section id="monthSummary">
                <div id="smryMessage" style="margin-top: -1%; margin-bottom: 0.5%;">This month's Summary</div>
                <div id="summary">
                    <div style="display: flex; justify-content: space-between;">Money Sent &nbsp;&nbsp; <span
                            id="amtSent"></span></div>
                    <hr style="margin: 1% -1.2% 1.5% -1.2%;">
                    <div style="display: flex; justify-content: space-between;">Money Received &nbsp;&nbsp; <span
                            id="amtReceived"></span></div>
                    <hr style="margin: 1% -1.2% 1.5% -1.2%;">
                    <div style="display: flex; justify-content: space-between;">Topups &nbsp;&nbsp; <span
                            id="topups"></span></div>
                </div>
            </section>
        </div>
    </main>
    <div id="successToast">Money sent successfully</div>

    <script src="/Dashboard/Dashboard.js"></script>
</body>

</html>
