<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History</title>

    <link rel="stylesheet" href="/Transaction-Page/Transaction.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <div id="main">

        <div id="header">

            <a class="brandLogo" href="/Dashboard/Dashboard.html">
                <span id="sadak">SADAK</span><span id="pe">PE</span>
            </a>

        </div>

        <div id="titleSection">

            <h1 id="pageTitle">
                Transaction History
            </h1>

        </div>

        <div id="filterSection">

            <button id="allBtn">
                All
            </button>

            <button id="sentBtn">
                Sent
            </button>

            <button id="receivedBtn">
                Received
            </button>

            <div id="timeFilter">

                <button id="timeBtn">
                    By Time ▼
                </button>

                <div id="timeOptions">

                    <div class="timeOption">
                        Today
                    </div>

                    <div class="timeOption">
                        Yesterday
                    </div>

                    <div class="timeOption">
                        This Month
                    </div>

                    <div class="timeOption">
                        This Year
                    </div>

                </div>

            </div>

        </div>

        <div id="transactionContainer">

            <!--
                Transactions will be generated by JavaScript.

                Backend Structure Expected:

                {
                    sender,
                    receiver,
                    amount,
                    type,
                    note,
                    createdAt
                }
            -->

        </div>

    </div>
    <div id="overlay"></div>

    <script src="/Transaction-Page/Transaction.js"></script>

</body>
</html>
